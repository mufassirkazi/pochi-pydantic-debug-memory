name: pochi

on:
  issue_comment:
    types: [created]

  pull_request:
    types: [closed]

jobs:
  pochi:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: sudo apt-get install gh -y

      # 🔍 Detect if lumina-support was used
      - name: Check if lumina-support was used
        id: check_skill
        if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
        run: |
          PR_BODY=$(jq -r '.pull_request.body' "$GITHUB_EVENT_PATH")

          ISSUE_NUMBER=$(echo "$PR_BODY" | grep -o '#[0-9]*' | head -n1 | tr -d '#')

          if [ -z "$ISSUE_NUMBER" ]; then
            echo "should_run=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          COMMENTS=$(gh issue view $ISSUE_NUMBER --json comments -q '.comments[].body')

          if echo "$COMMENTS" | grep -q "lumina-support"; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.CUSTOM_GITHUB_TOKEN_PYDANTIC }}

      # 🚀 Trigger learning AFTER merge
      - name: Trigger pochi for learning
        if: github.event_name == 'pull_request' && github.event.pull_request.merged == true && steps.check_skill.outputs.should_run == 'true'
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "/pochi use the lumina-support skill and analyze this merged PR and store a reusable pattern in .memory/patterns.json"
        env:
          GITHUB_TOKEN: ${{ secrets.CUSTOM_GITHUB_TOKEN_PYDANTIC }}

      # 🧠 Normal pochi execution
      - name: Run pochi
        if: github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '/pochi')
        uses: tabbyml/pochi/packages/github-action@main
        env:
          env:
          GITHUB_TOKEN: ${{ secrets.CUSTOM_GITHUB_TOKEN_PYDANTIC }} 
          POCHI_API_KEY: ${{ secrets.POCHI_API_KEY }}
          POCHI_MODEL: openai/gpt-5.2-codex